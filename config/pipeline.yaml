# Pipeline configuration — thresholds, resolution, batch sizes, paths.

# --- Shared parallelism ---
num_workers: 0                   # Parallel workers for all CPU/IO-bound steps (0=auto, uses all CPUs)

# --- Resolution settings ---
resolution:
  min_shortest_side: 384       # Discard images with shortest side < this
  max_longest_side: 1024       # Resize images with any side > this
  resize_mode: "shortest_side" # Resize shortest side to max_longest_side, keep aspect ratio
  jpeg_quality: 95             # Output JPEG quality (1-100)

# --- CLIP model settings ---
clip:
  model_name: "ViT-L-14"                # OpenCLIP model architecture
  pretrained: "laion2b_s32b_b82k"       # Pretrained weights
  device: "cuda"                        # "cuda" or "cpu"
  batch_size: 128                       # Images per batch for CLIP inference

# --- Filter thresholds ---
filter:
  soil_threshold: 0.24          # Minimum CLIP similarity to soil prompts to keep
  overlay_margin: -0.03          # Discard if overlay_score - clean_score > this (watermark/text)

# --- Download settings ---
download:
  limit_per_query_per_source: 200   # Max images per query per source
  timeout: 15                       # HTTP timeout in seconds
  max_retries: 4                    # Retry failed downloads
  workers_per_source: 4             # Parallel query workers per source (keep low to avoid IP bans)
  request_delay: 1.0                # Seconds between requests per source (rate limiting)

# --- Deduplication settings ---
dedup:
  phash_threshold: 10            # Max hamming distance for perceptual hash (0=identical, lower=stricter)

# --- Cluster-assisted review settings ---
clustering:
  k_min: 18                      # Minimum clusters considered by auto-k selection
  k_max: 40                      # Maximum clusters considered by auto-k selection
  pca_dim: 128                   # Dimensionality after PCA before KMeans
  knn_k: 7                       # Number of nearest annotation seeds for vote aggregation
  vote_ratio_min: 0.80           # Minimum consensus ratio for cluster and seed votes
  similarity_min: 0.28           # Minimum seed cosine similarity for suggestion acceptance
  margin_min: 0.03               # Minimum model confidence margin (best - runner-up)
  outlier_quantile_max: 0.90     # Cluster distance quantile above which images are flagged as outliers
  batch_size: 25                 # Embedding batch size used by cluster-review

# --- Output paths ---
paths:
  raw: "data/raw"
  resized: "data/resized"
  filtered: "data/filtered"
  labeled: "data/labeled"
  deduped: "data/deduped"
  dataset: "data/dataset"
  logs: "data/logs"
