# Pipeline configuration — thresholds, resolution, batch sizes, paths.

# --- Resolution settings ---
resolution:
  min_shortest_side: 384       # Discard images with shortest side < this
  max_longest_side: 1024       # Resize images with any side > this
  resize_mode: "shortest_side" # Resize shortest side to max_longest_side, keep aspect ratio
  jpeg_quality: 95             # Output JPEG quality (1-100)

# --- CLIP model settings ---
clip:
  model_name: "ViT-L-14"                # OpenCLIP model architecture
  pretrained: "laion2b_s32b_b82k"       # Pretrained weights
  device: "cuda"                        # "cuda" or "cpu"
  batch_size: 128                       # Images per batch for CLIP inference

# --- Filter thresholds ---
filter:
  soil_threshold: 0.24          # Minimum CLIP similarity to soil prompts to keep
  overlay_margin: 0.02          # Discard if overlay_score - clean_score > this (watermark/text)

# --- Download settings ---
download:
  limit_per_query_per_source: 200   # Max images per query per source
  timeout: 15                       # HTTP timeout in seconds
  max_retries: 4                    # Retry failed downloads

# --- Deduplication settings ---
dedup:
  phash_threshold: 10            # Max hamming distance for perceptual hash (0=identical, lower=stricter)

# --- Output paths ---
paths:
  raw: "data/raw"
  resized: "data/resized"
  filtered: "data/filtered"
  labeled: "data/labeled"
  deduped: "data/deduped"
  dataset: "data/dataset"
  logs: "data/logs"
