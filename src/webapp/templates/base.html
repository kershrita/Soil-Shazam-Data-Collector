<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Soil Shazam Data Collector — review pipeline steps, annotate soil images, and evaluate model accuracy.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
  <title>{% block title %}Soil Shazam Data Collector{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="topbar">
    <a href="/" class="topbar-brand">Soil Shazam Data Collector</a>
    <div class="topbar-steps">
      {% for s in steps|default([]) %}
      {% set _sid = s.id if s.id is defined else s['id'] %}
      <a href="/step/{{ s.id if s.id is defined else s['id'] }}"
         class="topbar-step {% if step is defined and step.id == _sid %}active{% endif %}">
        {{ s.name if s.name is defined else s['name'] }}
      </a>
      {% endfor %}
      <a href="/annotate"
         class="topbar-step topbar-step-accent {% if request.path.startswith('/annotate') %}active{% endif %}">
        Annotate
      </a>
      <a href="/evaluation"
         class="topbar-step topbar-step-accent {% if request.path.startswith('/evaluation') %}active{% endif %}">
        Results
      </a>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
